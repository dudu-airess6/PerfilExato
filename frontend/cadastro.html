<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfilExato SENAI - Criar Conta</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="form-box">
            <h2 style="color: #2e7d32; margin-bottom: 20px;">Criar Conta no PerfilExato</h2>
            <form id="form-cadastro">
                <div class="input-group">
                    <label for="nome-cadastro">Nome Completo</label>
                    <input type="text" id="nome-cadastro" required placeholder="Ex: Joana Alves dos Santos">
                </div>
                <div class="input-group">
                    <label for="email-cadastro">E-mail</label>
                    <input type="email" id="email-cadastro" required placeholder="seu@email.com">
                </div>
                <div class="input-group">
                    <label for="senha-cadastro">Senha</label>
                    <input type="password" id="senha-cadastro" required placeholder="Crie sua senha">
                </div>
                
                <div class="input-group">
                    <label for="confirmar-senha">Confirmar Senha</label>
                    <input type="password" id="confirmar-senha" required placeholder="Repita sua senha">
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Criar Conta &rarr;</button>
            </form>
            <p class="toggle-text">Já tem uma conta? <a href="login.html" class="toggle-link">Entre aqui</a></p>
        </div>
    </div>

    <script src="js/cadastro.js"></script>
</body>
</html>
