<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfilExato SENAI - Entrar</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="form-box">
            <h2 style="color: #2e7d32; margin-bottom: 20px;">Entrar no PerfilExato</h2>
            <form id="form-login">
                <div class="input-group">
                    <label for="email-login">E-mail</label>
                    <input type="email" id="email-login" required placeholder="seu@email.com">
                </div>
                <div class="input-group">
                    <label for="senha-login">Senha</label>
                    <input type="password" id="senha-login" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Entrar &rarr;</button>
            </form>
            <p class="toggle-text">Não tem uma conta? <a href="cadastro.html" class="toggle-link">Registe-se aqui</a></p>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
