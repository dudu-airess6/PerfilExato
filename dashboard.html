<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfilExato SENAI - Meu Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>PerfilExato SENAI</h1>
            <span>Menu</span>
        </div>

        <div class="dashboard-card">
            <div class="user-info">
                <h2>Olá, João Silva</h2>
                <p>Técnico em Eletromecânica</p>
                <p><strong>Prontidão para o Mercado:</strong></p>
                <div class="match-bar-container">
                    <div class="match-bar">85% Pronto</div>
                </div>
            </div>

            <div>
                <h3>Habilidades Detectadas</h3>
                <div class="skills-container">
                    <span class="skill-tag">Eletricidade Predial</span>
                    <span class="skill-tag">AutoCAD</span>
                    <span class="skill-tag">CLP</span>
                    <span class="skill-tag">Manutenção Preventiva</span>
                </div>
                <button class="btn-primary">Ver Vagas Compatíveis</button>
            </div>
        </div>
    </div>
<script src="js/script.js"></script>
</body>
</html>
